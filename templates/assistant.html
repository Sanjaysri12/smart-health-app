<!DOCTYPE html>
<html>
<head>
<title>AI Assistant</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* RESULT BOX */
.answer-box{
    margin-top:20px;
    padding:15px;
    border:1px solid white;
    border-radius:10px;
    background:#111;
    min-height:80px;
}

/* HISTORY BOX */
.history-box{
    margin-top:20px;
    padding:15px;
    border:1px solid white;
    border-radius:10px;
    background:#111;
    min-height:120px;
}

.history-item{
    border-bottom:1px solid #444;
    padding:5px 0;
}
</style>

</head>
<body style="background:black;color:white;">

<div class="container mt-4">

<h3>🤖 AI Fitness Assistant</h3>

<input id="msg" class="form-control mt-3" placeholder="Ask something...">
<button onclick="chat()" class="btn btn-info mt-2">Send</button>

<p id="reply"></p>

<!-- NEW BOX -->
<div class="answer-box" id="answerBox">
    Your response will appear here...
</div>

<!-- HISTORY SECTION (added below, no changes above) -->
<div class="history-box">
    <h5>📜 History</h5>
    <div id="historyList"></div>
</div>

</div>

<script>

let historyData = [];

function chat(){
fetch('/chat',{
method:'POST',
headers:{'Content-Type':'application/x-www-form-urlencoded'},
body:'msg='+msg.value
})
.then(r=>r.text())
.then(d=>{
    reply.innerText=d;
    answerBox.innerText=d;

    // STORE USER QUERY
    if(msg.value.trim() !== ""){
        historyData.push(msg.value);

        // DISPLAY HISTORY
        let historyHTML = "";
        historyData.forEach((item,index)=>{
            historyHTML += `<div class="history-item">${index+1}. ${item}</div>`;
        });
        historyList.innerHTML = historyHTML;
    }
});
}

</script>

</body>
</html>
